<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site da Sônia</title>  <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<header>
    <nav>
        <img src="/imagens/logo-tia-sonia.png" alt="logo do site" width="100px">
        <ul>
            <li><a class="icones" href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a class="icones" href="#"><i class="fa solid fa-pen-ruler"></i></a></li>
            <li><a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
            <li><a class="icones" href="#"><i class="fa-solid fa-user"></i></a></li>
        </ul>
    </nav>
</header>
     <main>
        <article class="banner">
            <section id="banner">
                <img src="imagens/banner.png" alt="banner da tia Sônia" id="banner__image">
            </section>
            <section id="reservas">
            <h2 id="reservas_titulo">Vagas na semana disponível</h2>
            <button id="reservas_botao">Reservar Vagas</button>
            </section>
        </article>
    </main>

    <article class="sobre">
        <section class="sobre">
            <h1 class="sobre__titulo">Conheça a Dona Sônia</h1>
            <p class="sobre__texto">A Dona Sônia está super feliz em ter você por aqui. Ela borda todos os dias e ama o que faz, se você gosta de bordados como ela, conhece alguém que amaria receber um bordado, visite o seu catálogo e faça uma reserva.</p>
        </section>
    </article>

    <artice>
        <section>
            <img src="imagens/tia-sonia.png" alt="mulher com cabelos grisalhos em um jardim de rosas">
        </section>
    </article>
</body>
</html>
